<!doctype html>
<html lang="en" data-layout="vertical" data-topbar="light" data-sidebar="dark" data-sidebar-size="sm-hover"
    data-sidebar-image="none" data-preloader="disable">

<head>

    <meta charset="utf-8" />
    <title>Grid Js | Velzon - Admin & Dashboard Template</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="Premium Multipurpose Admin & Dashboard Template" name="description" />
    <meta content="Themesbrand" name="author" />
    <!-- App favicon -->
    <link rel="shortcut icon" href="assets/images/favicon.ico">

    <!-- gridjs css -->
    <link rel="stylesheet" href="assets/libs/gridjs/theme/mermaid.min.css">

    <!-- Layout config Js -->
    <script src="assets/js/layout.js"></script>
    <!-- Bootstrap Css -->
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <!-- Icons Css -->
    <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <!-- App Css-->
    <link href="assets/css/app.min.css" rel="stylesheet" type="text/css" />
    <!-- custom Css-->
    <link href="assets/css/custom.min.css" rel="stylesheet" type="text/css" />
    <!-- NavBar CSS -->
    <link href="assets/css/rci-navBar.css" rel="stylesheet" />

    <link rel="stylesheet" href="assets/css/management.css">
</head>

<body>

    <!-- Begin page -->
    <div id="layout-wrapper">
        <!-- NavBar 容器 -->
        <div id="navBar-placeholder"></div>
        <!-- ============================================================== -->
        <!-- Start right Content here -->
        <!-- ============================================================== -->
        <div class="main-content">

            <div class="page-content">
                <div class="container-fluid">

                    <div class="row">
                        <div class="col-lg-12">
                            <div class="card">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h5 class="card-title mb-0">部門管理設定</h5>
                                    <button type="button" class="btn btn-primary add-btn" data-bs-toggle="modal"
                                        id="create-btn" data-bs-target="#showModal">
                                        <i class="ri-add-line align-bottom me-1"></i> 新增部門
                                    </button>
                                </div><!-- end card header -->

                                <div class="card-body">
                                    <div class="table-responsive">
                                        <table id="buttons-datatables"
                                            class="display table table-bordered table-striped" style="width:100%">
                                            <thead>
                                                <tr>
                                                    <th class="text-center" style="width: 50px;">編號</th>
                                                    <th>部門ID</th>
                                                    <th>部門名稱</th>
                                                    <th>上班時間</th>
                                                    <th>下班時間</th>
                                                    <th>準時加點</th>
                                                    <th>遲到扣點</th>
                                                    <th>更新</th>
                                                    <th>刪除</th>
                                                </tr>
                                            </thead>
                                            <tbody>

                                            </tbody>
                                        </table>
                                    </div>
                                </div><!-- end card-body -->
                            </div><!-- end card -->
                        </div>
                        <!-- end col -->
                    </div>
                    <!-- end row -->
                    <div class="modal fade" id="showModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                        aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content">
                                <div class="modal-header bg-light p-3">
                                    <h5 class="modal-title" id="exampleModalLabel">新增部門</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                                        id="close-modal"></button>
                                </div>

                                <div id="form">
                                    <div class="modal-body">
                                        <div class="mb-3">
                                            <label for="name-field" class="form-label">部門名稱</label>
                                            <input type="text" id="name-field" name="name" class="form-control"
                                                placeholder="請輸入部門名稱" required />
                                        </div>

                                        <div class="row">
                                            <div class="col-lg-6">
                                                <div class="mb-3">
                                                    <label for="workTime-field" class="form-label">上班時間</label>
                                                    <input type="time" step="1" id="workTime-field" name="workTime"
                                                        class="form-control" required />
                                                </div>
                                            </div>
                                            <div class="col-lg-6">
                                                <div class="mb-3">
                                                    <label for="leaveTime-field" class="form-label">下班時間</label>
                                                    <input type="time" step="1" id="leaveTime-field" name="leaveTime"
                                                        class="form-control" required />
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-lg-6">
                                                <div class="mb-3">
                                                    <label for="onTimeAdd-field" class="form-label">準時加點</label>
                                                    <input type="number" id="onTimeAdd-field" name="onTimeAdd"
                                                        class="form-control" required />
                                                </div>
                                            </div>
                                            <div class="col-lg-6">
                                                <div class="mb-3">
                                                    <label for="lateTimeMinus-field" class="form-label">遲到扣點</label>
                                                    <input type="number" id="lateTimeMinus-field" name="lateTimeMinus"
                                                        class="form-control" required />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <div class="hstack gap-2 justify-content-end">
                                            <button type="button" class="btn btn-light"
                                                data-bs-dismiss="modal">取消</button>
                                            <button type="button" class="btn btn-success" id="add-btn">確認新增</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- container-fluid -->
            </div>
            <!-- End Page-content -->
        </div>
        <!-- end main content-->

    </div>
    <!-- END layout-wrapper -->




    <!-- JAVASCRIPT -->
    <script src="assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/libs/simplebar/simplebar.min.js"></script>
    <script src="assets/libs/node-waves/waves.min.js"></script>
    <script src="assets/libs/feather-icons/feather.min.js"></script>
    <script src="assets/js/pages/plugins/lord-icon-2.1.0.js"></script>
    <script src="assets/js/plugins.js"></script>

    <!-- prismjs plugin -->
    <script src="assets/libs/prismjs/prism.js"></script>

    <!-- gridjs js -->
    <script src="assets/libs/gridjs/gridjs.umd.js"></script>

    <!-- gridjs init -->
    <!-- <script src="assets/js/pages/gridjs.init.js"></script> -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/pages/rci-department-management.backend.js"></script>

    <!-- App js -->
    <!-- <script src="assets/js/app.js"></script> -->

    <!-- NavBar loader -->
    <script src="assets/js/importFile/navBar-loader.js"></script>
</body>

</html>
