  lang="en"
  data-layout="vertical"
  data-topbar="light"
  data-sidebar="dark"
  data-sidebar-size="sm-hover"
  data-sidebar-image="none"
  data-preloader="disable"
>

    <meta charset="utf-8" />
    <title>Products | Velzon - Admin & Dashboard Template</title>

      rel="stylesheet"
      type="text/css"
    />

    <script src="assets/js/layout.js"></script>

      href="assets/css/bootstrap.min.css"
      rel="stylesheet"
      type="text/css"
    />

    <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <!-- App Css-->
    <link href="assets/css/app.min.css" rel="stylesheet" type="text/css" />
    <!-- custom Css-->
    <link href="assets/css/custom.min.css" rel="stylesheet" type="text/css" />

  <body>
    <!-- Begin page -->
    <div id="layout-wrapper">
      <!-- NavBar 容器 -->
      <div id="navBar-placeholder"></div>

      <!-- ============================================================== -->
      <!-- Start right Content here -->
      <!-- ============================================================== -->
      <div class="main-content">
        <div class="page-content">
          <div class="container-fluid">
            <div class="page-header">
              <h1 class="page-title">紅利/商品管理</h1>
            </div>
            <div class="row mb-4">
              <div class="col-12">
                <div class="text-center">
                  <ul
                    class="nav nav-pills list-inline categories-filter animation-nav d-inline-flex"
                    id="admin-tabs"
                    role="tablist"
                  >
                    <li class="list-inline-item nav-item">
                      <a
                        class="nav-link categories active"
                        data-bs-toggle="tab"
                        href="#tab-product"
                        role="tab"
                        >商品管理</a
                      >
                    </li>
                    <li class="list-inline-item nav-item">
                      <a
                        class="nav-link categories"
                        data-bs-toggle="tab"
                        href="#tab-history"
                        role="tab"
                        >兌換紀錄</a
                      >
                    </li>
                    <li class="list-inline-item nav-item">
                      <a
                        class="nav-link categories"
                        data-bs-toggle="tab"
                        href="#tab-setting"
                        role="tab"
                        >紅利設定</a
                      >
                    </li>
                  </ul>
                </div>
              </div>
            </div>

            <div class="tab-content text-muted">
              <div
                class="tab-pane active show"
                id="tab-product"
                role="tabpanel"
              >
                <div class="row">
                  <div class="col-12">
                    <div class="card" id="productList">
                      <div class="filter-section">
                        <div class="filter-row">
                          <div class="filter-group">
                            <div class="search-box">
                              <input
                                type="text"
                                class="form-control search"
                                placeholder="搜尋商品..."
                              />
                              <i class="ri-search-line search-icon"></i>
                            </div>
                          </div>
                          <button
                            type="button"
                            class="filter-add-btn"
                            id="btn-add-product"
                          >
                            <i class="ri-add-line align-bottom me-1"></i>
                            新增商品
                          </button>
                        </div>
                      </div>
                      <div class="card-body">
                        <div class="table-responsive table-card mb-1">
                          <table
                            class="table align-middle table-nowrap"
                            id="productTable"
                          >
                            <thead class="table-dark text-center">
                              <tr>
                                <th style="width: 80px">編號</th>
                                <th>商品</th>
                                <th>點數</th>
                                <th>庫存</th>
                                <th>狀態</th>
                                <th style="width: 80px">操作</th>
                              </tr>
                            </thead>
                            <tbody
                              class="list form-check-all text-center"
                            ></tbody>
                          </table>
                        </div>
                        <div
                          class="d-flex align-items-center justify-content-between px-1 pb-1"
                        >
                          <span
                            class="text-muted small"
                            id="productPaginationInfo"
                          ></span>
                          <div id="productPagination"></div>
                        </div>
                      </div>
                    </div>

                    <div class="card d-none" id="productEdit">
                      <div class="card-header">
                        <h4 class="card-title mb-0" id="editFormTitle">
                          編輯商品
                        </h4>
                      </div>
                      <div class="card-body">
                        <form id="editProductForm">
                          <input type="hidden" id="edit-product-id" />
                          <input type="hidden" id="edit-version" />

                          <div class="row g-3">
                            <div class="col-md-6">
                              <label class="form-label fw-semibold"
                                >商品名稱
                                <span class="text-danger">*</span></label
                              >
                              <input
                                type="text"
                                class="form-control"
                                id="edit-name"
                                placeholder="請輸入商品名稱"
                                required
                              />
                            </div>
                            <div class="col-md-3">
                              <label class="form-label fw-semibold"
                                >所需點數
                                <span class="text-danger">*</span></label
                              >
                              <input
                                type="number"
                                class="form-control"
                                id="edit-points"
                                min="0"
                                placeholder="0"
                                required
                              />
                            </div>
                            <div class="col-md-3">
                              <label class="form-label fw-semibold"
                                >庫存數量
                                <span class="text-danger">*</span></label
                              >
                              <input
                                type="number"
                                class="form-control"
                                id="edit-stock"
                                min="0"
                                placeholder="0"
                                required
                              />
                            </div>
                            <div class="col-md-3">
                              <label class="form-label fw-semibold"
                                >有效天數</label
                              >
                              <input
                                type="number"
                                class="form-control"
                                id="edit-valid-days"
                                min="1"
                                placeholder="不填表示永久有效"
                              />
                            </div>
                            <div class="col-md-3">
                              <label class="form-label fw-semibold"
                                >上架狀態</label
                              >
                              <select class="form-select" id="edit-status">
                                <option value="上架中">上架中</option>
                                <option value="下架">下架</option>
                              </select>
                            </div>
                            <div class="col-12">
                              <label class="form-label fw-semibold"
                                >商品描述</label
                              >
                              <textarea
                                class="form-control"
                                id="edit-description"
                                rows="3"
                                placeholder="請輸入商品說明…"
                              ></textarea>
                            </div>
                            <div class="col-12">
                              <label class="form-label fw-semibold"
                                >商品圖片</label
                              >
                              <input
                                type="file"
                                class="form-control"
                                id="edit-image"
                                accept="image/*"
                              />
                              <div class="mt-2">
                                <img
                                  id="edit-image-preview"
                                  src=""
                                  class="d-none product-img-preview"
                                  alt="商品預覽圖"
                                />
                              </div>
                            </div>
                          </div>

                          <div class="text-end mt-4">
                            <button
                              type="button"
                              class="btn btn-light"
                              id="btn-back"
                            >
                              返回
                            </button>
                            <button type="submit" class="btn btn-success ms-2">
                              <i class="ri-save-3-line align-middle me-1"></i
                              >儲存
                            </button>
                          </div>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="tab-pane fade" id="tab-history" role="tabpanel">
                <div class="row">
                  <div class="col-12">
                    <div class="card">
                      <div class="filter-section">
                        <div class="filter-row">
                          <div class="filter-group">
                            <div class="search-box">
                              <input
                                type="text"
                                class="form-control"
                                id="filterHistoryProduct"
                                placeholder="搜尋商品名稱..."
                              />
                              <i class="ri-search-line search-icon"></i>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="card-body">
                        <div class="table-responsive table-card mb-1">
                          <table
                            class="table align-middle table-nowrap"
                            id="historyTable"
                          >
                            <thead class="table-dark text-center">
                              <tr>
                                <th style="width: 48px"></th>
                                <th>商品名稱</th>
                                <th>狀態</th>
                                <th>庫存</th>
                                <th>已發出</th>
                                <th>可使用</th>
                                <th>已使用</th>
                                <th>已過期</th>
                              </tr>
                            </thead>
                            <tbody id="historyTableBody"></tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="tab-pane fade" id="tab-setting" role="tabpanel">
                <div class="row justify-content-center">
                  <div class="col-xl-5 col-lg-7">
                    <div class="card shadow-sm border-0">
                      <div class="card-header align-items-center d-flex">
                        <h4 class="card-title mb-0 flex-grow-1">
                          <i class="ri-settings-4-line text-primary me-1"></i>
                          考勤紅利點數規則設定
                        </h4>
                      </div>
                      <div class="card-body">
                        <div class="alert alert-info border-0 shadow-none mb-4">
                          <i class="ri-information-line me-1"></i>
                          設定全域預設點數規則。若部門已單獨設定非零數值，則以部門設定優先；未設定（或設為 0）的部門將採用此全域數值。
                        </div>
                        <form id="pointSettingsForm">
                          <div class="row gy-4">
                            <div class="col-12">
                              <label class="form-label text-success fw-bold">
                                <i class="ri-checkbox-circle-line me-1"></i>
                                準時上班獎勵點數
                              </label>
                              <div class="input-group">
                                <span
                                  class="input-group-text bg-success-subtle text-success border-success-subtle"
                                  >+</span
                                >
                                <input
                                  type="number"
                                  class="form-control"
                                  id="set-on-time"
                                  min="0"
                                  placeholder="例：10"
                                />
                                <span class="input-group-text">點</span>
                              </div>
                            </div>

                            <div class="col-12">
                              <label class="form-label text-danger fw-bold">
                                <i class="ri-timer-2-line me-1"></i>
                                遲到扣除點數
                              </label>
                              <div class="input-group">
                                <span
                                  class="input-group-text bg-danger-subtle text-danger border-danger-subtle"
                                  >-</span
                                >
                                <input
                                  type="number"
                                  class="form-control"
                                  id="set-late"
                                  min="0"
                                  placeholder="例：5"
                                />
                                <span class="input-group-text">點</span>
                              </div>
                            </div>

                            <div class="col-12 text-end">
                              <button
                                type="submit"
                                class="btn btn-primary px-4"
                              >
                                <i class="ri-save-3-line align-middle me-1"></i>
                                儲存設定
                              </button>
                            </div>
                          </div>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
      <!-- end main content-->
